steps:
  # ─── Step 1: Run backend unit tests ────────────────────────────────────────
  - name: 'maven:3.9.8-eclipse-temurin-21-alpine'
    id: test-backend
    dir: 'backend'
    args: ['mvn', 'test', '-q']

  # ─── Step 2: Build and push backend Docker image ───────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-backend
    args:
      - 'build'
      - '--tag=gcr.io/$PROJECT_ID/stadium-mate-backend:$COMMIT_SHA'
      - '--tag=gcr.io/$PROJECT_ID/stadium-mate-backend:latest'
      - '--cache-from=gcr.io/$PROJECT_ID/stadium-mate-backend:latest'
      - 'backend/'

  - name: 'gcr.io/cloud-builders/docker'
    id: push-backend
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/stadium-mate-backend']

  # ─── Step 3: Deploy backend to Cloud Run ───────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: deploy-backend
    args:
      - 'run'
      - 'deploy'
      - 'stadium-mate-backend'
      - '--image=gcr.io/$PROJECT_ID/stadium-mate-backend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--max-instances=10'
      - '--set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,GRAPH_SOURCE=firestore'
      - '--set-secrets=GEMINI_API_KEY=gemini-api-key:latest'

  # ─── Step 3.5: Get backend URL ──────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: get-backend-url
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        gcloud run services describe stadium-mate-backend \
          --region us-central1 --format 'value(status.url)' > /workspace/backend_url.txt

  # ─── Step 4: Build frontend ─────────────────────────────────────────────────
  - name: 'node:20-alpine'
    id: build-frontend
    dir: 'frontend'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm ci --silent
        NEXT_PUBLIC_API_URL=$(cat /workspace/backend_url.txt) npm run build

  # ─── Step 5: Deploy frontend to Cloud Run ──────────────────────────────────
  # (Containerise the Next.js standalone output and deploy)
  - name: 'gcr.io/cloud-builders/docker'
    id: build-frontend-image
    dir: 'frontend'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        docker build \
          --build-arg NEXT_PUBLIC_API_URL=$(cat /workspace/backend_url.txt) \
          --tag=gcr.io/$PROJECT_ID/stadium-mate-frontend:$COMMIT_SHA \
          --tag=gcr.io/$PROJECT_ID/stadium-mate-frontend:latest \
          .

  - name: 'gcr.io/cloud-builders/docker'
    id: push-frontend
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/stadium-mate-frontend']

  - name: 'gcr.io/cloud-builders/gcloud'
    id: deploy-frontend
    args:
      - 'run'
      - 'deploy'
      - 'stadium-mate-frontend'
      - '--image=gcr.io/$PROJECT_ID/stadium-mate-frontend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=256Mi'

images:
  - 'gcr.io/$PROJECT_ID/stadium-mate-backend'
  - 'gcr.io/$PROJECT_ID/stadium-mate-frontend'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '900s'
